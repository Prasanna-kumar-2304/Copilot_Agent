<!-- Power Apps Code App - DirectLine Bot Chat -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>DirectLine Bot Chat - Power Apps</title>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-primary: #333;
            --text-secondary: #666;
            --border-color: #e0e0e0;
            --success: #4caf50;
            --error: #f44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
            overflow: hidden;
        }

        .header {
            background: var(--background);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .message-content {
            background: var(--background);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .assistant-message {
            justify-content: flex-start;
        }

        .assistant-message .message-content {
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 18px 18px 18px 4px;
        }

        .error-message .message-content {
            background: #ffebee;
            color: var(--error);
            border-color: var(--error);
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: dot-bounce 1.4s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: white;
        }

        #messageInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            transition: border-color 0.2s;
            max-height: 150px;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .send-btn, .clear-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn {
            background: var(--background);
            color: white;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #f0f0f0;
            color: var(--text-primary);
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .status-bar {
            padding: 8px 20px;
            background: #f8f9fa;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status.loading::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-color);
            animation: pulse 1s infinite;
        }

        .status.error {
            color: var(--error);
        }

        .status.ready {
            color: var(--success);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .scrollbar-hidden::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <!-- Header -->
            <div class="header">
                <h1>🤖 DirectLine Bot Chat</h1>
                <p>Chat with your Microsoft Bot Framework powered agent</p>
            </div>

            <!-- Chat Messages Area -->
            <div class="chat-messages scrollbar-hidden" id="chatMessages">
                <div class="message assistant-message">
                    <div class="message-content">
                        <p>👋 Hello! I'm your bot assistant. Ask me anything!</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message here... (Shift+Enter for new line, Enter to send)"
                    rows="3"
                ></textarea>
                <div class="button-group">
                    <button id="sendBtn" class="send-btn">Send</button>
                    <button id="clearBtn" class="clear-btn">🗑️ Clear</button>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span id="statusText" class="status ready">Ready</span>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = '/'; // Will be set dynamically
        let sessionId = localStorage.getItem('chatSessionId') || generateSessionId();
        let conversationInitialized = false;
        let isLoading = false;

        // DOM Elements
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusText = document.getElementById('statusText');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            localStorage.setItem('chatSessionId', sessionId);
            messageInput.focus();
            setStatus('Ready to chat', 'ready');
        });

        // Generate unique session ID
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // Initialize if needed
            if (!conversationInitialized) {
                const initialized = await initializeConversation();
                if (!initialized) return;
            }

            // Add user message
            addMessageToChat(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            setLoading(true);
            showLoadingMessage();

            try {
                const response = await fetch(`${API_BASE_URL}api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId })
                });

                removeLoadingMessage();
                const data = await response.json();

                if (!response.ok) {
                    showErrorMessage(data.error || 'Failed to get response');
                } else {
                    addMessageToChat(data.message, 'assistant');
                }
            } catch (error) {
                removeLoadingMessage();
                showErrorMessage('Network error: ' + error.message);
            }

            setLoading(false);
            messageInput.focus();
        }

        // Initialize conversation
        async function initializeConversation() {
            try {
                setStatus('Initializing...', 'loading');
                const response = await fetch(`${API_BASE_URL}api/init`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });

                const data = await response.json();
                if (response.ok) {
                    conversationInitialized = true;
                    setStatus('Connected to bot', 'ready');
                    return true;
                } else {
                    showErrorMessage(data.error || 'Failed to initialize');
                    setStatus('Connection error', 'error');
                    return false;
                }
            } catch (error) {
                showErrorMessage('Failed to initialize: ' + error.message);
                setStatus('Connection error', 'error');
                return false;
            }
        }

        // Add message to chat
        function addMessageToChat(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');

            contentDiv.innerHTML = `<p>${formattedText}</p>`;
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show loading message
        function showLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message';
            messageDiv.id = 'loading-message';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Remove loading message
        function removeLoadingMessage() {
            const loadingMsg = document.getElementById('loading-message');
            if (loadingMsg) loadingMsg.remove();
        }

        // Show error message
        function showErrorMessage(error) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content error-message';
            contentDiv.innerHTML = `<p>❌ Error: ${error}</p>`;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Set loading state
        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            messageInput.disabled = loading;
            setStatus(loading ? 'Waiting for response...' : 'Ready', loading ? 'loading' : 'ready');
        }

        // Set status
        function setStatus(text, state = 'ready') {
            statusText.textContent = text;
            statusText.classList.remove('loading', 'error');
            if (state === 'loading') statusText.classList.add('loading');
            else if (state === 'error') statusText.classList.add('error');
        }

        // Clear conversation
        async function clearConversation() {
            if (!confirm('Clear conversation?')) return;

            try {
                await fetch(`${API_BASE_URL}api/clear-history`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });

                conversationInitialized = false;
                chatMessages.innerHTML = '<div class="message assistant-message"><div class="message-content"><p>👋 Conversation cleared. Let\'s start fresh!</p></div></div>';
                setStatus('Ready', 'ready');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', clearConversation);

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isLoading && messageInput.value.trim()) {
                    sendMessage();
                }
            }
        });
    </script>
</body>
</html>
